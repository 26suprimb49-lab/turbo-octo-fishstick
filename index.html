<!DOCTYPE html>
<html>
<head>
<title>Weel Cot AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f19;
    color:white;
    display:flex;
    height:100vh;
}

.sidebar{
    width:260px;
    background:#0f1424;
    border-right:1px solid #1c2338;
    padding:10px;
    overflow-y:auto;
}

.topbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
}

.logo{
    width:40px;
    height:40px;
    border-radius:50%;
    background:radial-gradient(circle,#10a37f,#1f2a44);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

.newchat{
    width:100%;
    padding:10px;
    background:#10a37f;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    margin:10px 0;
}

.chat-item{
    background:#1a2236;
    padding:10px;
    border-radius:8px;
    margin:6px 0;
    cursor:pointer;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#0f1424;
    border-bottom:1px solid #1c2338;
}

.chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.msg{
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    max-width:75%;
    white-space:pre-wrap;
}

.user{
    background:#10a37f;
    margin-left:auto;
}

.bot{
    background:#1f2a44;
}

.inputbar{
    display:flex;
    padding:10px;
    background:#0f1424;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#1a2236;
    color:white;
}

button{
    padding:12px;
    margin-left:8px;
    border:none;
    border-radius:8px;
    background:#10a37f;
    color:white;
    cursor:pointer;
}

select{
    background:#1a2236;
    color:white;
    border:none;
    padding:8px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="topbar">
        <div class="logo">👑</div>
        <b>Weel Cot AI</b>
    </div>

    <button class="newchat" onclick="newChat()">+ New Chat</button>

    <div id="chatList"></div>

</div>

<div class="main">

<div class="header">

    <span id="title">Chat</span>

    <select id="modeSelect" onchange="changeMode()">
        <option value="home">🏠 Home Mode</option>
        <option value="school">📚 School Mode</option>
    </select>

</div>

<div class="chat" id="chat"></div>

<div class="inputbar">
<input id="input" placeholder="Ask anything..." />
<button onclick="send()">Send</button>
</div>

</div>

<script>

const API_KEY = "PASTE_YOUR_OPENROUTER_KEY";

let currentMode = "home";

function changeMode(){
    currentMode =
    document.getElementById("modeSelect").value;
}

let chats =
JSON.parse(localStorage.getItem("chats") || "[]");

let current = 0;

if(chats.length === 0){
    newChat();
}else{
    renderChats();
    renderChat();
}

function save(){
    localStorage.setItem(
        "chats",
        JSON.stringify(chats)
    );
}

function newChat(){

    chats.push({
        name:"Chat "+(chats.length+1),
        msgs:[]
    });

    current = chats.length-1;

    save();

    renderChats();
    renderChat();
}

function renderChats(){

    let box =
    document.getElementById("chatList");

    box.innerHTML="";

    chats.forEach((c,i)=>{

        let div =
        document.createElement("div");

        div.className="chat-item";

        div.innerText=c.name;

        div.onclick=()=>{
            current=i;
            renderChat();
        };

        box.appendChild(div);

    });

}

function renderChat(){

    document.getElementById("title")
    .innerText =
    chats[current].name;

    let box =
    document.getElementById("chat");

    box.innerHTML="";

    chats[current].msgs.forEach(m=>{

        let div =
        document.createElement("div");

        div.className =
        "msg "+m.type;

        div.innerText=m.text;

        box.appendChild(div);

    });

}

function add(text,type){

    chats[current].msgs.push({
        text,
        type
    });

    save();

    renderChat();
}

async function ai(text){

    try{

        let systemPrompt = "";

        if(currentMode === "home"){

            systemPrompt =
            "You are Weel Cot AI made by the Suprim Leader. Be fun and smart.";

        }

        if(currentMode === "school"){

            let webAnswer = "";

            try{

                const search =
                await fetch(
                "http://localhost:3000/search?q=" +
                encodeURIComponent(text)
                );

                const searchData =
                await search.json();

                webAnswer =
                searchData.answer;

            }catch(e){

                webAnswer =
                "No web info.";

            }

            systemPrompt =
            "You are Weel Cot AI School Mode. " +
            "Use this web info if useful: " +
            webAnswer;
        }

        const res =
        await fetch(
        "https://openrouter.ai/api/v1/chat/completions",
        {
            method:"POST",

            headers:{
                "Authorization":
                "Bearer " + API_KEY,

                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                model:
                "meta-llama/llama-3-8b-instruct",

                messages:[
                    {
                        role:"system",
                        content:systemPrompt
                    },
                    {
                        role:"user",
                        content:text
                    }
                ]

            })

        });

        const data =
        await res.json();

        return data.choices?.[0]
        ?.message?.content
        || "No response";

    }catch(err){

        return "AI error";

    }

}

function send(){

    let input =
    document.getElementById("input");

    let text =
    input.value.trim();

    if(!text) return;

    add(text,"user");

    input.value="";

    ai(text).then(res=>{

        add(res,"bot");

    });

}

document
.getElementById("input")
.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        send();

    }

});

</script>

</body>
</html>
